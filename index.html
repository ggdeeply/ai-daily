body{

}
body::after{

body::before{

.container{max-width:960px;margin:0 auto;position:relative;z-index:1}
.header{margin-bottom:48px}
.header h1{font-family:'Noto Sans SC',sans-serif;font-size:36px;font-weight:700;color:var(--text-primary);letter-spacing:0.02em;margin-bottom:6px}
.header .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-tertiary);letter-spacing:0.08em}
.header .sub span{color:var(--accent)}
.stats-bar{display:flex;gap:20px;margin-bottom:40px;flex-wrap:wrap}
.stat-card{flex:1;min-width:140px;background:var(--bg-card);border:1px solid var(--border-card);border-radius:12px;padding:18px 22px;backdrop-filter:blur(20px);box-shadow:0 4px 24px rgba(0,0,0,0.3),inset 0 1px 0 var(--shadow-hl)}

.search-box{position:relative;margin-bottom:36px}

.summary-section{margin-bottom:40px}
.summary-section h2{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:16px;letter-spacing:0.04em;transition:color 0.8s ease}
.tag-cloud{display:flex;flex-wrap:wrap;gap:8px}
.tag{font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 12px;border-radius:100px;background:var(--tag-bg);color:var(--text-secondary);border:1px solid var(--border-subtle);cursor:pointer;transition:all 0.2s}
.tag:hover{border-color:var(--border-high);color:var(--accent);background:var(--badge-bg)}
.tag.active{border-color:var(--accent);color:var(--accent);background:var(--badge-bg)}
.week-group{margin-bottom:32px}
.week-header{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.08em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:10px;transition:color 0.8s ease,border-color 0.8s ease}
.week-header .week-range{color:var(--text-tertiary);font-weight:400}
.week-header .week-count{font-size:10px;background:var(--badge-bg);color:var(--accent);padding:1px 8px;border-radius:100px;margin-left:auto}
.day-list{display:flex;flex-direction:column;gap:8px}
.day-card{display:flex;align-items:center;gap:16px;background:var(--bg-card);border:1px solid var(--border-card);border-radius:10px;padding:14px 20px;cursor:pointer;text-decoration:none;transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;backdrop-filter:blur(18px)}
[data-theme="day"] .day-card{box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.day-card:hover{border-color:var(--border-high);box-shadow:0 0 20px rgba(167,139,250,0.06)}

.day-card .day-date{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--text-primary);min-width:85px;white-space:nowrap;transition:color 0.8s ease}
.day-card .day-wd{font-size:11px;color:var(--text-tertiary);min-width:36px}
.day-card .day-lead{flex:1;font-size:13px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.8s ease}
.day-card .day-stats{display:flex;gap:6px;flex-shrink:0}
.day-card .day-stats .sc{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:100px;background:var(--badge-bg);color:var(--accent);white-space:nowrap;transition:background 0.8s ease,color 0.8s ease}

.footer a:hover{text-decoration:underline}

<script>
(function(){
  var D = window.__INDEX_DATA__;
  var weekGroups = [];
  var activeDomain = null;

  // Theme
  (function(){
    var h = new Date().getHours();
    var t = (h >= 6 && h < 18) ? 'day' : 'night';
    document.documentElement.setAttribute('data-theme', t);
  })();

  document.getElementById('themeToggle').addEventListener('click', function(){
    var cur = document.documentElement.getAttribute('data-theme');
    var next = (cur === 'night') ? 'day' : 'night';
    document.documentElement.setAttribute('data-theme', next);
  });

  // Build week groups
  var weeks = {};
  D.dailies.forEach(function(d) {
    var dt = new Date(d.date + 'T00:00:00+08:00');
    var dow = dt.getDay();
    if (dow === 0) dow = 7;
    var ws = new Date(dt);
    ws.setDate(ws.getDate() - dow + 1);
    var wk = ws.toISOString().slice(0,10);
    if (!weeks[wk]) weeks[wk] = { start: wk, days: [], itemCount: 0 };
    weeks[wk].days.push(d);
    weeks[wk].itemCount += d.itemCount;
  });

  weekGroups = Object.keys(weeks).sort().reverse().map(function(k){ return weeks[k]; });

  // Render
  var avgDaily = Math.round(D.totalItems / D.dateRange.totalDays);
  document.getElementById('statsBar').innerHTML =
    '<div class="stat-card"><div class="num">' + D.dateRange.totalDays + '</div><div class="lbl">日报天数</div></div>' +
    '<div class="stat-card"><div class="num">' + D.totalItems.toLocaleString() + '</div><div class="lbl">总条目数</div></div>' +
    '<div class="stat-card"><div class="num">' + weekGroups.length + '</div><div class="lbl">覆盖周数</div></div>' +
    '<div class="stat-card"><div class="num">' + avgDaily + '</div><div class="lbl">日均条目</div></div>';

  document.getElementById('rangeLabel').textContent = D.dateRange.from + ' ~ ' + D.dateRange.to;
  document.getElementById('updateTime').textContent = new Date().toISOString().slice(0,16).replace('T',' ');

  // Latest link
  var latest = D.dailies[D.dailies.length - 1];
  document.getElementById('latestLink').innerHTML = '<a href="' + latest.fileName + '">最新日报 (' + latest.date + ')</a>';

  // Domain tags
  var maxCount = D.topDomains.length > 0 ? D.topDomains[0].count : 1;
  document.getElementById('tagList').innerHTML = D.topDomains.map(function(d) {
    return '<span class="tag" data-domain="' + d.domain + '" title="' + d.count + ' 条">' + d.domain + ' (' + d.count + ')</span>';
  }).join('');

  // Tag click
  document.querySelectorAll('#tagList .tag').forEach(function(t) {
    t.addEventListener('click', function(){
      var dom = this.dataset.domain;
      if (activeDomain === dom) { activeDomain = null; this.classList.remove('active'); }
      else {
        activeDomain = dom;
        document.querySelectorAll('#tagList .tag').forEach(function(x){ x.classList.toggle('active', x.dataset.domain === dom); });
      }
      filterCards();
    });
  });

  // Day cards
  function renderCards() {
    var html = '';
    weekGroups.forEach(function(wk) {
      var ed = new Date(wk.start + 'T00:00:00+08:00');
      ed.setDate(ed.getDate() + 6);
      var es = ed.toISOString().slice(0,10);
      html += '<div class="week-group"><div class="week-header">' + wk.start + '<span class="week-range">' + wk.start + ' ~ ' + es + '</span><span class="week-count">' + wk.days.length + ' days &middot; ' + wk.itemCount + ' items</span></div><div class="day-list">';
      wk.days.slice().sort(function(a,b){ return b.date.localeCompare(a.date); }).forEach(function(d) {
        var badges = '';
        var barHtml = '';
        var cats = ['ai-models','ai-products','industry','paper','tip'];
        cats.forEach(function(c){
          var cnt = d.secCounts[c] || 0;
          if (cnt > 0) badges += '<span class="sc">' + cnt + '</span>';
          barHtml += '<div class="seg seg-' + c + '" style="flex:' + cnt + '" title="' + c + ': ' + cnt + '"></div>';
        });
        html += '<a class="day-card" href="' + d.fileName + '">';
        html += '<span class="day-date">' + d.date + '</span>';
        html += '<span class="day-wd">' + d.weekday + '</span>';
        html += '<span class="day-bar">' + barHtml + '</span>';
        html += '<span class="day-lead" title="' + (d.lead || '').replace(/"/g,'&quot;') + '">' + (d.lead || '(无导语)') + '</span>';
        html += '<span class="day-stats">' + badges + '</span>';
        html += '<span class="day-total">' + d.itemCount + '</span>';
        html += '</a>';
      });
      html += '</div></div>';
    });
    document.getElementById('content').innerHTML = html;
  }
  renderCards();

  // Filters
  function filterCards() {
    var q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.day-card').forEach(function(card){
      var show = true;
      if (activeDomain) {
        var lead = (card.querySelector('.day-lead') || {}).title || '';
        if (lead.toLowerCase().indexOf(activeDomain) < 0) show = false;
      }
      if (q && card.textContent.toLowerCase().indexOf(q) < 0) show = false;
      card.style.display = show ? '' : 'none';
    });
  }
  document.getElementById('searchInput').addEventListener('input', filterCards);
})();
</script>
